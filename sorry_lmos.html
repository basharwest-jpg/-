<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sorry Lmos 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@1,400;1,700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink: #f9a8d4;
      --rose: #fb7eb4;
      --blush: #fce4ec;
      --lilac: #e8b4f8;
      --soft-white: #fff5f9;
      --text: #7d3c60;
      --gold: #f4c2c2;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: var(--soft-white);
      font-family: 'Quicksand', sans-serif;
      overflow-x: hidden;
      position: relative;
      cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><text y='20' font-size='20'>🌸</text></svg>"), auto;
    }

    /* ─── Animated gradient background ─── */
    .bg {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #fde2ef 0%, #fce4f5 25%, #ede0ff 50%, #fce4ec 75%, #fde2ef 100%);
      background-size: 400% 400%;
      animation: gradShift 10s ease infinite;
      z-index: 0;
    }
    @keyframes gradShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ─── Floating petals / hearts ─── */
    .floaties {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }
    .floaty {
      position: absolute;
      font-size: 1.6rem;
      animation: fall linear infinite;
      opacity: 0.75;
    }
    @keyframes fall {
      0%   { transform: translateY(-60px) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.8; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    /* ─── Main layout ─── */
    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      gap: 0;
    }

    /* ─── Decorative top ribbon ─── */
    .ribbon {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(90deg, var(--pink), var(--lilac), var(--pink));
      padding: 8px 0;
      font-size: 1.1rem;
      letter-spacing: 2px;
      color: #fff;
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
      z-index: 10;
      box-shadow: 0 2px 12px rgba(249,168,212,0.5);
    }

    /* ─── Card container ─── */
    .card {
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 36px;
      border: 2.5px solid rgba(249,168,212,0.55);
      padding: 60px 55px 50px;
      max-width: 540px;
      width: 100%;
      text-align: center;
      box-shadow:
        0 8px 40px rgba(251,126,180,0.18),
        0 2px 8px rgba(255,255,255,0.8) inset;
      animation: popIn 0.9s cubic-bezier(0.23,1.5,0.5,1) both;
      position: relative;
      overflow: hidden;
    }
    @keyframes popIn {
      0%   { transform: scale(0.6) translateY(40px); opacity: 0; }
      100% { transform: scale(1) translateY(0);      opacity: 1; }
    }

    /* glitter shimmer on card */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 8px,
        rgba(255,255,255,0.12) 8px,
        rgba(255,255,255,0.12) 9px
      );
      border-radius: 36px;
      pointer-events: none;
    }

    /* ─── Bow decoration ─── */
    .bow {
      font-size: 3.2rem;
      animation: bounce 2s ease-in-out infinite;
      display: block;
      margin-bottom: 4px;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50%       { transform: translateY(-8px) scale(1.08); }
    }

    /* ─── Main sorry text ─── */
    .sorry-label {
      font-family: 'Dancing Script', cursive;
      font-size: 1.1rem;
      color: var(--rose);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 8px;
      opacity: 0;
      animation: fadeUp 0.7s 0.5s forwards;
    }
    .sorry-main {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(2.8rem, 8vw, 4.6rem);
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
      background: linear-gradient(135deg, #c2547a, #9b3a8c, #d46caf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      animation: fadeUp 0.8s 0.7s forwards;
    }
    .name-highlight {
      display: block;
      font-family: 'Dancing Script', cursive;
      font-size: clamp(3rem, 9vw, 5.2rem);
      font-style: normal;
      background: linear-gradient(135deg, #fb7eb4, #c97ce4, #f4a4c8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 2px 8px rgba(251,126,180,0.35));
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Divider ─── */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 22px auto;
      width: 70%;
      opacity: 0;
      animation: fadeUp 0.7s 1s forwards;
    }
    .divider-line {
      flex: 1;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, var(--pink), transparent);
    }
    .divider-icon { font-size: 1.2rem; }

    /* ─── Sub message ─── */
    .sub-msg {
      font-size: 1rem;
      color: #b06090;
      line-height: 1.7;
      font-weight: 600;
      letter-spacing: 0.4px;
      opacity: 0;
      animation: fadeUp 0.7s 1.1s forwards;
    }

    /* ─── Heart burst button ─── */
    .btn {
      margin-top: 30px;
      display: inline-block;
      padding: 13px 36px;
      background: linear-gradient(135deg, var(--rose), var(--lilac));
      color: #fff;
      border: none;
      border-radius: 50px;
      font-family: 'Quicksand', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(251,126,180,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      opacity: 0;
      animation: fadeUp 0.7s 1.3s forwards;
      position: relative;
      overflow: hidden;
    }
    .btn:hover {
      transform: scale(1.06) translateY(-2px);
      box-shadow: 0 10px 30px rgba(251,126,180,0.55);
    }
    .btn:active { transform: scale(0.97); }

    /* ripple */
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.25);
      opacity: 0;
      border-radius: 50px;
      transition: opacity 0.3s;
    }
    .btn:hover::after { opacity: 1; }

    /* ─── Scattered decorative icons ─── */
    .deco {
      position: fixed;
      pointer-events: none;
      z-index: 1;
      font-size: 1.8rem;
      animation: floatDeco ease-in-out infinite;
      opacity: 0.5;
    }
    @keyframes floatDeco {
      0%, 100% { transform: translateY(0) rotate(-5deg); }
      50%       { transform: translateY(-14px) rotate(5deg); }
    }

    /* ─── Hearts burst on click ─── */
    .burst {
      position: fixed;
      pointer-events: none;
      font-size: 1.4rem;
      animation: burst 1s ease-out forwards;
      z-index: 999;
    }
    @keyframes burst {
      0%   { transform: translate(0,0) scale(0); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(1.5); opacity: 0; }
    }

    /* ─── Footer ─── */
    .footer {
      margin-top: 36px;
      font-size: 0.78rem;
      color: #c490b0;
      letter-spacing: 2px;
      opacity: 0;
      animation: fadeUp 0.7s 1.5s forwards;
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <!-- Floating emojis -->
  <div class="floaties" id="floaties"></div>

  <!-- Fixed decorations -->
  <div class="deco" style="top:12%;left:5%;animation-duration:3.2s">🌸</div>
  <div class="deco" style="top:20%;right:6%;animation-duration:4s;font-size:1.4rem">🎀</div>
  <div class="deco" style="bottom:18%;left:8%;animation-duration:3.6s;font-size:2rem">🌷</div>
  <div class="deco" style="bottom:25%;right:7%;animation-duration:4.4s;font-size:1.6rem">💝</div>
  <div class="deco" style="top:60%;left:3%;animation-duration:5s;font-size:1.2rem">✨</div>
  <div class="deco" style="top:45%;right:3%;animation-duration:3.8s;font-size:1.2rem">🦋</div>
  <div class="deco" style="top:80%;left:15%;animation-duration:4.2s;font-size:1rem">💫</div>
  <div class="deco" style="top:8%;right:20%;animation-duration:3s;font-size:1rem">🌺</div>

  <!-- Ribbon -->
  <div class="ribbon">🎀 &nbsp; ✨ &nbsp; 💕 &nbsp; ✨ &nbsp; 🎀</div>

  <div class="page">
    <div class="card">
      <span class="bow">🎀</span>
      <p class="sorry-label">a little message for you</p>
      <h1 class="sorry-main">
        Sorry
        <span class="name-highlight">Lmos</span>
      </h1>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-icon">🌸</span>
        <div class="divider-line"></div>
      </div>

      <p class="sub-msg">
        From the bottom of my heart 💕<br/>
        wishing you all the sweetness in the world 🍓✨
      </p>

      <button class="btn" onclick="burstHearts(event)">Send Love 💌</button>
    </div>

    <p class="footer">✨ &nbsp; made with love &amp; pink glitter &nbsp; ✨</p>
  </div>

  <script>
    // ── Generate floating emojis ──
    const emojis = ['🌸','🌷','💕','💝','✨','🎀','🌺','🦋','💫','🍓','🌙','⭐'];
    const container = document.getElementById('floaties');
    for (let i = 0; i < 28; i++) {
      const el = document.createElement('div');
      el.className = 'floaty';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.animationDuration = (5 + Math.random() * 10) + 's';
      el.style.animationDelay = (Math.random() * 12) + 's';
      el.style.fontSize = (0.9 + Math.random() * 1.2) + 'rem';
      container.appendChild(el);
    }

    // ── Heart burst on button click ──
    function burstHearts(e) {
      const hearts = ['💕','💖','💗','💓','💝','✨','🌸'];
      for (let i = 0; i < 14; i++) {
        const el = document.createElement('div');
        el.className = 'burst';
        el.textContent = hearts[Math.floor(Math.random() * hearts.length)];
        el.style.left = e.clientX + 'px';
        el.style.top  = e.clientY + 'px';
        const angle = Math.random() * Math.PI * 2;
        const dist  = 60 + Math.random() * 100;
        el.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
        el.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1050);
      }
    }

    // ── Sparkle cursor trail ──
    document.addEventListener('mousemove', (e) => {
      if (Math.random() > 0.7) {
        const s = document.createElement('div');
        s.className = 'burst';
        s.textContent = ['✨','💫','⭐'][Math.floor(Math.random()*3)];
        s.style.left = e.clientX + 'px';
        s.style.top  = e.clientY + 'px';
        s.style.fontSize = '0.9rem';
        s.style.setProperty('--tx', (Math.random()-0.5)*30 + 'px');
        s.style.setProperty('--ty', (Math.random()-0.5)*30 + 'px');
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 1000);
      }
    });
  </script>
</body>
</html>
